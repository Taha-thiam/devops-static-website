name: CI Docker Build

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    # runs-on: ubuntu-latest
    runs-on: self-hosted

    steps:
      - name: Checkout du code
        uses: actions/checkout@v3

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build de l'image Docker
        run: docker build -t tthiam/devops-static-website:v1 .


        # hhzh
      - name: Run Trivy vulnerability scanner
        run: |
          # Télécharger Trivy pour Windows
          $version = "0.50.1"
          Invoke-WebRequest -Uri "https://github.com/aquasecurity/trivy/releases/download/v$version/trivy_$($version)_windows-64bit.zip" -OutFile "trivy.zip"
          Expand-Archive -Path "trivy.zip" -DestinationPath "." -Force
          
          # Scanner l'image
          .\trivy.exe image `
            --severity CRITICAL,HIGH,MEDIUM `
            --exit-code 1 `
            --vuln-type os,library `
            --ignore-unfixed `
            tthiam/devops-static-website:v1
        shell: pwsh

      - name: Push de l'image vers Docker Hub
        run: docker push tthiam/devops-static-website:v1